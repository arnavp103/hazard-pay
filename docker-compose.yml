name: hazard-pay

services:
  postgres:
    # Single source of truth for the Postgres version across dev, test, and CI.
    # Pinned major; bump deliberately, never implicitly.
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hazard_pay
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hazard_pay"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  postgres-data:
