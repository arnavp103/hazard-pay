name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    # Lint and type-check share one job (one checkout/pnpm-setup/install)
    # since neither needs Postgres — see issue #40. Test stays separate: it
    # needs the service container, which lint/type-check would otherwise pay
    # for on every run.
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6 # version comes from packageManager in package.json

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v6
        with:
          path: .turbo
          # Keyed on lockfile + turbo config content rather than the commit
          # sha: commits that don't touch either hit this cache exactly
          # instead of always missing and writing a fresh entry (issue #40).
          key: turbo-static-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/turbo.json') }}
          restore-keys: |
            turbo-static-${{ runner.os }}-

      - run: pnpm turbo run lint type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # Postgres for packages/db tests (issue #14): tests connect to whatever
      # DATABASE_URL points at (issue #8). Keep this image major in sync with
      # the root docker-compose.yml, which is the source of truth.
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hazard_pay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6 # version comes from packageManager in package.json

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v6
        with:
          path: .turbo
          # See the static-checks job for why this is hash-keyed rather than
          # sha-keyed (issue #40).
          key: turbo-test-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/turbo.json') }}
          restore-keys: |
            turbo-test-${{ runner.os }}-

      - run: pnpm test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/hazard_pay
